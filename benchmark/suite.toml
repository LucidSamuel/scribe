# ZKGadgetEval benchmark suite manifest
#
# Each entry defines a gadget with its tier (difficulty) and constraint count.
# Tiers:
#   1 = single-tactic (linear_combination, ring, rcases)
#   2 = multi-step (case splits, substitution chains, 2-5 tactic lines)
#   3 = deep algebraic (curve arithmetic, multi-hypothesis, 5+ tactic lines)
#
# kind = "negative" marks a deliberately under-constrained gadget whose spec is
# FALSE: the loop is graded on REFUSING to prove it. A negative gadget that gets
# "proved" is a soundness alarm and fails the whole run. Without negatives, the
# suite cannot distinguish "the loop proves true specs" from "the loop proves
# anything you hand it".

version = "0.2.0"

[[gadgets]]
file = "suite/01-range-check-8.toml"
tier = 2
constraints = 9
description = "8-bit range check via bit decomposition"

[[gadgets]]
file = "suite/02-boolean-check.toml"
tier = 1
constraints = 1
description = "Boolean constraint: b = 0 ∨ b = 1"

