# NEGATIVE GADGET — vacuous constraint set. The proof loop MUST fail here.
#
# The only constraint is x - x = 0, which holds for every x, yet the spec claims
# x = 0. The hypothesis gives the prover literally nothing; any x ≠ 0 (e.g. x = 1)
# is a counterexample. This is the degenerate limit of under-constraint: a spec
# with no supporting constraints at all.
#
# Witness: x
# Constraint: x - x = 0        (trivially true)
# Claimed (false) soundness: x = 0
#
# A run that "proves" this spec is a soundness alarm.
#
# The gadget `name` is deliberately NEUTRAL: it becomes the theorem name in the
# scaffold the model sees, and a "neg-..." name would leak the expected answer.
# Only this manifest-side file marks it negative.

name = "zero-check"
modulus = "21888242871839275222246405745257275088548364400416034343698204186575808495617"
soundness_spec = "x = 0"

[[witnesses]]
id = 0
name = "x"

[[constraints]]
label = "trivial"
terms = [
    { coeff = "1", vars = [0] },
    { coeff = "-1", vars = [0] },
]
