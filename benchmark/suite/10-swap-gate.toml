# Swap gate: conditionally swap two values
#
# If b=0: out1=in1, out2=in2 (no swap)
# If b=1: out1=in2, out2=in1 (swap)
#
# Witnesses: b, in1, in2, out1, out2
# Constraints:
#   b*(b-1) = 0
#   out1 - in1 + b*in1 - b*in2 = 0  (out1 = in1 + b*(in2 - in1))
#   out2 - in2 - b*in1 + b*in2 = 0  (out2 = in2 + b*(in1 - in2))
#
# Soundness: (b = 0 ∧ out1 = in1 ∧ out2 = in2) ∨ (b = 1 ∧ out1 = in2 ∧ out2 = in1)

name = "swap-gate"
modulus = "21888242871839275222246405745257275088548364400416034343698204186575808495617"
soundness_spec = "(b = 0 ∧ out1 = in1 ∧ out2 = in2) ∨ (b = 1 ∧ out1 = in2 ∧ out2 = in1)"

[[witnesses]]
id = 0
name = "b"

[[witnesses]]
id = 1
name = "in1"

[[witnesses]]
id = 2
name = "in2"

[[witnesses]]
id = 3
name = "out1"

[[witnesses]]
id = 4
name = "out2"

# b^2 - b = 0
[[constraints]]
label = "boolean"
terms = [
    { coeff = "1", vars = [0, 0] },
    { coeff = "-1", vars = [0] },
]

# out1 - in1 + b*in1 - b*in2 = 0
[[constraints]]
label = "mux1"
terms = [
    { coeff = "1", vars = [3] },
    { coeff = "-1", vars = [1] },
    { coeff = "1", vars = [0, 1] },
    { coeff = "-1", vars = [0, 2] },
]

# out2 - in2 - b*in1 + b*in2 = 0
[[constraints]]
label = "mux2"
terms = [
    { coeff = "1", vars = [4] },
    { coeff = "-1", vars = [2] },
    { coeff = "-1", vars = [0, 1] },
    { coeff = "1", vars = [0, 2] },
]
