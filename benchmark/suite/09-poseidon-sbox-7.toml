# Poseidon S-box: y = x^7 via squaring/cubing chain
#
# Used in BLS12-381 Poseidon (alpha=7).
# Decomposed: s1 = x^2, s2 = x^3, s3 = x^6, y = x^7
#
# Witnesses: x, s1, s2, s3, y
# Soundness: y = x ^ 7

name = "poseidon-sbox-7"
modulus = "21888242871839275222246405745257275088548364400416034343698204186575808495617"
soundness_spec = "y = x ^ 7"

[[witnesses]]
id = 0
name = "x"

[[witnesses]]
id = 1
name = "s1"

[[witnesses]]
id = 2
name = "s2"

[[witnesses]]
id = 3
name = "s3"

[[witnesses]]
id = 4
name = "y"

# s1 - x*x = 0  (s1 = x^2)
[[constraints]]
label = "square"
terms = [
    { coeff = "1", vars = [1] },
    { coeff = "-1", vars = [0, 0] },
]

# s2 - s1*x = 0  (s2 = x^3)
[[constraints]]
label = "cube"
terms = [
    { coeff = "1", vars = [2] },
    { coeff = "-1", vars = [1, 0] },
]

# s3 - s2*s2 = 0  (s3 = x^6)
[[constraints]]
label = "sixth"
terms = [
    { coeff = "1", vars = [3] },
    { coeff = "-1", vars = [2, 2] },
]

# y - s3*x = 0  (y = x^7)
[[constraints]]
label = "output"
terms = [
    { coeff = "1", vars = [4] },
    { coeff = "-1", vars = [3, 0] },
]
