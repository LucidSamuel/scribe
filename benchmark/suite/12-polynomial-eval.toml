# Polynomial evaluation via Horner's method: y = c3*x^3 + c2*x^2 + c1*x + c0
#
# Decomposed into multiplications:
#   t1 = c3*x + c2
#   t2 = t1*x + c1
#   y  = t2*x + c0
#
# Witnesses: x, c0, c1, c2, c3, t1, t2, y
# Soundness: y = c3 * x ^ 3 + c2 * x ^ 2 + c1 * x + c0

name = "polynomial-eval"
modulus = "21888242871839275222246405745257275088548364400416034343698204186575808495617"
soundness_spec = "y = c3 * x ^ 3 + c2 * x ^ 2 + c1 * x + c0"

[[witnesses]]
id = 0
name = "x"

[[witnesses]]
id = 1
name = "c0"

[[witnesses]]
id = 2
name = "c1"

[[witnesses]]
id = 3
name = "c2"

[[witnesses]]
id = 4
name = "c3"

[[witnesses]]
id = 5
name = "t1"

[[witnesses]]
id = 6
name = "t2"

[[witnesses]]
id = 7
name = "y"

# t1 - c3*x - c2 = 0
[[constraints]]
label = "horner_1"
terms = [
    { coeff = "1", vars = [5] },
    { coeff = "-1", vars = [4, 0] },
    { coeff = "-1", vars = [3] },
]

# t2 - t1*x - c1 = 0
[[constraints]]
label = "horner_2"
terms = [
    { coeff = "1", vars = [6] },
    { coeff = "-1", vars = [5, 0] },
    { coeff = "-1", vars = [2] },
]

# y - t2*x - c0 = 0
[[constraints]]
label = "horner_3"
terms = [
    { coeff = "1", vars = [7] },
    { coeff = "-1", vars = [6, 0] },
    { coeff = "-1", vars = [1] },
]
