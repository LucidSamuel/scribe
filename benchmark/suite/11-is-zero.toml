# Is-zero check: out = 1 if x = 0, out = 0 if x ≠ 0
#
# Witnesses: x, x_inv, out
# Constraints:
#   x * out = 0           (if out=1 then x must be 0)
#   x * x_inv + out - 1 = 0  (x has an inverse, or out=1)
#
# Soundness: (x = 0 ∧ out = 1) ∨ (x ≠ 0 ∧ out = 0)

name = "is-zero"
modulus = "21888242871839275222246405745257275088548364400416034343698204186575808495617"
soundness_spec = "(x = 0 ∧ out = 1) ∨ (x ≠ 0 ∧ out = 0)"

[[witnesses]]
id = 0
name = "x"

[[witnesses]]
id = 1
name = "x_inv"

[[witnesses]]
id = 2
name = "out"

# x * out = 0
[[constraints]]
label = "zero_product"
terms = [
    { coeff = "1", vars = [0, 2] },
]

# x * x_inv + out - 1 = 0
[[constraints]]
label = "completeness"
terms = [
    { coeff = "1", vars = [0, 1] },
    { coeff = "1", vars = [2] },
    { coeff = "-1", vars = [] },
]
