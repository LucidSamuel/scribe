# Conditional select: z = if b then x else y
#
# Witness: b, x, y, z
# Constraints:
#   b * (b - 1) = 0                (b is boolean)
#   b * x + (1 - b) * y - z = 0   (conditional select)
#
# Soundness: (b = 0 ∧ z = y) ∨ (b = 1 ∧ z = x)

name = "conditional-select"
modulus = "21888242871839275222246405745257275088548364400416034343698204186575808495617"
soundness_spec = "(b = 0 and z = y) or (b = 1 and z = x)"

[[witnesses]]
id = 0
name = "b"

[[witnesses]]
id = 1
name = "x"

[[witnesses]]
id = 2
name = "y"

[[witnesses]]
id = 3
name = "z"

# b * (b - 1) = 0  =>  b^2 - b = 0
[[constraints]]
label = "boolean"
terms = [
    { coeff = "1", vars = [0, 0] },
    { coeff = "-1", vars = [0] },
]

# b*x + (1 - b)*y - z = 0
# = b*x + y - b*y - z = 0
[[constraints]]
label = "select"
terms = [
    { coeff = "1", vars = [0, 1] },
    { coeff = "1", vars = [2] },
    { coeff = "-1", vars = [0, 2] },
    { coeff = "-1", vars = [3] },
]
