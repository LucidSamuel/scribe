# Non-zero check via multiplicative inverse
#
# Proves a field element is non-zero by exhibiting its inverse.
# Fundamental building block for division gates in ZK circuits.
#
# Witnesses: x, x_inv
# Constraints:
#   x * x_inv - 1 = 0
#
# Soundness: x ≠ 0

name = "nonzero-check"
modulus = "21888242871839275222246405745257275088548364400416034343698204186575808495617"
soundness_spec = "x ≠ 0"

[[witnesses]]
id = 0
name = "x"

[[witnesses]]
id = 1
name = "x_inv"

# x * x_inv - 1 = 0
[[constraints]]
label = "inverse"
terms = [
    { coeff = "1", vars = [0, 1] },
    { coeff = "-1", vars = [] },
]
