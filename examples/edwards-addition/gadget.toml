# Edwards curve point addition (Baby Jubjub)
#
# Twisted Edwards curve: a*x^2 + y^2 = 1 + d*x^2*y^2
# Baby Jubjub parameters: a = 168700, d = 168696
#
# Addition formulas (denominator-free form):
#   x3 * (1 + d*x1*x2*y1*y2) = x1*y2 + y1*x2
#   y3 * (1 - d*x1*x2*y1*y2) = y1*y2 - a*x1*x2
#
# Rearranged:
#   x3 + d*x3*x1*x2*y1*y2 - x1*y2 - y1*x2 = 0
#   y3 - d*y3*x1*x2*y1*y2 - y1*y2 + a*x1*x2 = 0
#
# Soundness: if input points are on the curve, output is on the curve.

name = "edwards-addition"
modulus = "21888242871839275222246405745257275088548364400416034343698204186575808495617"
soundness_spec = "168700 * x3 * x3 + y3 * y3 = 1 + 168696 * x3 * x3 * y3 * y3"

[[witnesses]]
id = 0
name = "x1"

[[witnesses]]
id = 1
name = "y1"

[[witnesses]]
id = 2
name = "x2"

[[witnesses]]
id = 3
name = "y2"

[[witnesses]]
id = 4
name = "x3"

[[witnesses]]
id = 5
name = "y3"

[[hypotheses]]
name = "h_on_curve_1"
lean_type = "(168700 : ZMod p) * x1 * x1 + y1 * y1 = 1 + (168696 : ZMod p) * x1 * x1 * y1 * y1"

[[hypotheses]]
name = "h_on_curve_2"
lean_type = "(168700 : ZMod p) * x2 * x2 + y2 * y2 = 1 + (168696 : ZMod p) * x2 * x2 * y2 * y2"

# x3 + 168696*x3*x1*x2*y1*y2 - x1*y2 - y1*x2 = 0
[[constraints]]
label = "add_x"
terms = [
    { coeff = "1", vars = [4] },
    { coeff = "168696", vars = [4, 0, 2, 1, 3] },
    { coeff = "-1", vars = [0, 3] },
    { coeff = "-1", vars = [1, 2] },
]

# y3 - 168696*y3*x1*x2*y1*y2 - y1*y2 + 168700*x1*x2 = 0
[[constraints]]
label = "add_y"
terms = [
    { coeff = "1", vars = [5] },
    { coeff = "-168696", vars = [5, 0, 2, 1, 3] },
    { coeff = "-1", vars = [1, 3] },
    { coeff = "168700", vars = [0, 2] },
]
